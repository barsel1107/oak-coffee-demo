<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAK Coffee Co. | Menü</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #faf8f5;
            color: #2b2b2b;
            margin: 0;
            padding: 80px 5% 50px;
        }

        .menu-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 5%;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            z-index: 1000;
        }

        .menu-navbar a {
            color: #1a1a1a;
            font-weight: 800;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .menu-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #1a1a1a;
            position: relative;
        }

        .menu-title::after {
            content: '';
            width: 60px;
            height: 4px;
            background-color: #c06c45;
            display: block;
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
        }

        .menu-category {
            margin-bottom: 2.5rem;
        }

        .menu-category h2 {
            color: #c06c45;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #f1ede7;
            padding-bottom: 0.5rem;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            padding: 0.5rem 0;
            border-bottom: 1px dashed #e0e0e0;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .item-price {
            font-weight: 800;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <nav class="menu-navbar">
        <a href="index.html">← Ana Sayfa</a>
    </nav>

    <h1 class="menu-title">Menümüz</h1>

    <div class="menu-container">
        <div class="menu-category">
            <h2>Nitelikli Kahveler</h2>
            <div class="menu-item">
                <span class="item-name">Americano</span>
                <span class="item-price">x TL</span>
            </div>
            <div class="menu-item">
                <span class="item-name">Latte</span>
                <span class="item-price">x TL</span>
            </div>
            <div class="menu-item">
                <span class="item-name">V60 (Demleme)</span>
                <span class="item-price">x TL</span>
            </div>
        </div>

        <div class="menu-category">
            <h2>Tatlılar & Yiyecekler</h2>
            <div class="menu-item">
                <span class="item-name">Ev Yapımı Kurabiye</span>
                <span class="item-price">x TL</span>
            </div>
            <div class="menu-item">
                <span class="item-name">San Sebastian Cheesecake</span>
                <span class="item-price">x TL</span>
            </div>
        </div>
    </div>

</body>
</html>
